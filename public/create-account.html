<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Create Account | NDPi Monitor</title>
	<script src="/functions.js"></script>
	<script src="/auth.js"></script>
	<link rel="stylesheet" href="/styles_ii.css">
	<link rel="icon" type="image/svg+xml" href="/assets/nlcsvg-square-outline-filled.svg">
</head>
<body class="hide-scrollbar">
	<div id="wallpaper"></div>
	<div class="auth-container">
		<button onclick="history.back()" class="back-btn" style="position: absolute; top: 20px; left: 20px; background: transparent; border: none; color: rgba(255,255,255,0.7); font-size: 18px; cursor: pointer;">←</button>
		<div class="auth-card">
			<h1 class="auth-title">Create Account</h1>
			<p class="auth-subtitle">Create a new user account (Admin Only)</p>
			
			<form id="createAccountForm">
				<div class="form-group">
					<label class="form-label" for="firstName">First Name</label>
					<input type="text" id="firstName" class="form-input" required autocomplete="given-name">
				</div>
				
				<div class="form-group">
					<label class="form-label" for="lastName">Last Name</label>
					<input type="text" id="lastName" class="form-input" required autocomplete="family-name">
				</div>
				
				<div class="form-group">
					<label class="form-label" for="username">Username</label>
					<input type="text" id="username" class="form-input" required autocomplete="username">
					<p class="form-hint">Username must be unique</p>
				</div>
				
				<div class="form-group">
					<label class="form-label" for="pin">Temporary PIN</label>
					<input type="password" id="pin" class="form-input" required pattern="[0-9]{4}|[0-9]{6}" inputmode="numeric" maxlength="6" autocomplete="new-password">
					<p class="form-hint">4 or 6 digit temporary PIN (user will change on first login)</p>
					<p class="error-message" id="pinError">PIN must be 4 or 6 digits</p>
				</div>
				
				<div class="form-group">
					<label class="form-label" for="pinConfirm">Confirm PIN</label>
					<input type="password" id="pinConfirm" class="form-input" required pattern="[0-9]{4}|[0-9]{6}" inputmode="numeric" maxlength="6" autocomplete="new-password">
					<p class="error-message" id="confirmError">PINs do not match</p>
				</div>
				
				<p class="error-message" id="formError" style="margin-bottom: 15px;"></p>
				
				<button type="submit" class="button-primary" style="width: 100%;">Create Account</button>
			</form>
			
			<p class="link-text">
				<a href="/advanced-account-settings.html">← Back to Manage Accounts</a>
			</p>
		</div>
	</div>

	<script>
		// Check if user is admin
		/*
		const accountData = localStorage.getItem('ndpi_account');
		if (!accountData) {
			window.location.href = '/signin.html';
		} else {
			const account = JSON.parse(accountData);
		}
		*/

		setScale();
		let account = {};
		(async () => {
			account = await loadUserAccount();
			if (!account.isAdmin) {
				alert('Access denied. Admin privileges required.');
				window.location.href = '/';
			}
			setNavigationButtons();
		})();


		const form = document.getElementById('createAccountForm');
		const pinInput = document.getElementById('pin');
		const pinConfirmInput = document.getElementById('pinConfirm');
		const pinError = document.getElementById('pinError');
		const confirmError = document.getElementById('confirmError');
		const formError = document.getElementById('formError');

		pinInput.addEventListener('input', () => {
			const pin = pinInput.value;
			if (pin.length > 0 && pin.length !== 4 && pin.length !== 6) {
				pinError.style.display = 'block';
			} else {
				pinError.style.display = 'none';
			}
		});

		pinConfirmInput.addEventListener('input', () => {
			if (pinConfirmInput.value && pinConfirmInput.value !== pinInput.value) {
				confirmError.style.display = 'block';
			} else {
				confirmError.style.display = 'none';
			}
		});

		form.addEventListener('submit', async (e) => {
			e.preventDefault();
			
			formError.style.display = 'none';
			
			const firstName = document.getElementById('firstName').value.trim();
			const lastName = document.getElementById('lastName').value.trim();
			const username = document.getElementById('username').value.trim();
			const pin = pinInput.value;
			const pinConfirm = pinConfirmInput.value;
			
			// Validation
			if (pin !== pinConfirm) {
				confirmError.style.display = 'block';
				return;
			}
			
			if (pin.length !== 4 && pin.length !== 6) {
				pinError.style.display = 'block';
				return;
			}
			
			try {
				const res = await fetch('/api/account/create', {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ firstName, lastName, username, pin })
				});
				
				const data = await res.json();
				
				if (res.ok) {
					alert(`Account created for ${firstName} ${lastName}!\n\nUsername: ${username}\nTemporary PIN: ${pin}\n\nUser must sign in and set their own PIN.`);
					window.location.href = '/advanced-account-settings.html';
				} else {
					formError.textContent = data.error || 'Failed to create account';
					formError.style.display = 'block';
				}
			} catch (error) {
				formError.textContent = 'Network error. Please try again.';
				formError.style.display = 'block';
			}
		});
	</script>
</body>
</html>
