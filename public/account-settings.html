<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Account Settings | NDPi Monitor</title>
	<link rel="stylesheet" href="/styles_ii.css">
	<link rel="icon" type="image/svg+xml" href="/assets/nlcsvg-square-outline-filled.svg">
	<script src="/auth.js"></script>
	<script src="/ws-client.js"></script>
	<script src="/modal.js"></script>
	<script src="/functions.js"></script>
	<script src="/screen-saver.js"></script>
</head>
<body class="hide-scrollbar">
	<div id="wallpaper"></div>
	<div id="main-div" class="app">
		<div class="topbar">
			<div class="topbar-spacer"></div>
			<div onclick="window.location.href='/'" class="topbar-logo" id="topbarLogo"></div>
		</div>
		<div class="bottombar">
			<div class="bottombar-nav">
				<button id="navDashboard" class="nav-btn"></button>
				<button id="navDevices" class="nav-btn"></button>
				<button id="navGroups" class="nav-btn"></button>
				<button id="navSettings" class="nav-btn"></button>
				<button id="navAccount" class="nav-btn"></button>
			</div>
		</div>

		<section class="dashboard">
			<div class="card">
				<h2>Profile Information</h2>
				<div class="card-content">
					<div class="settings-row">
						<label>Username</label>
						<div id="username" style="color: rgba(255,255,255,0.6);">Loading...</div>
					</div>
					
					<div class="settings-row">
						<label for="firstName">First Name</label>
						<input type="text" id="firstName">
					</div>
					
					<div class="settings-row">
						<label for="lastName">Last Name</label>
						<input type="text" id="lastName">
					</div>
					
					<button class="button-primary" id="update-profile" style="margin-top: 14px; width: fit-content;">Save Changes</button>
				</div>
			</div>

			<div class="card">
				<h2>Change PIN</h2>
				<div class="card-content">
					<div class="settings-row">
						<label for="newPin">New PIN</label>
						<input type="password" id="newPin" pattern="[0-9]{4}|[0-9]{6}" inputmode="numeric" maxlength="6" placeholder="4 or 6 digits">
					</div>
					
					<div class="settings-row">
						<label for="confirmPin">Confirm PIN</label>
						<input type="password" id="confirmPin" pattern="[0-9]{4}|[0-9]{6}" inputmode="numeric" maxlength="6">
					</div>
					
					<button id="changePIN" class="button-primary" style="margin-top: 14px; width: fit-content;">Update PIN</button>
				</div>
			</div>

			<div class="card">
				<div class="card-content">
					<button id="signOut" class="button-danger" style="width: stretch;">Sign Out</button>
				</div>
			</div>

		</section>
	</div>
	<script src="/account-settings.js"></script>
</body>
</html>
