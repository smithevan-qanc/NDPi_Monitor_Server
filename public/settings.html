	// Screen Saver Settings Functions
	function getScreenSaverSettings() {
		const defaults = {
			inactivityMinutes: 5,
			disableSchedules: []
		};
		const saved = localStorage.getItem('ndpi_screensaver_settings');
		return saved ? JSON.parse(saved) : defaults;
	}

	let runningFavoriteSources = [];

	async function getFavoriteSourcesFromSystem() {
		try {
			const srcRes = await fetch('/api/favorite-ndi-sources');
			const srcData = await srcRes.json();
			if (Array.isArray(srcData)) {
				runningFavoriteSources = srcData;
			} else {
				runningFavoriteSources = [{
					name: 'No Favorites. Enter Source Name Here',
					url: 'Enter Source IP and Port here (e.g. 192.168.1.2:5961)'
				}];
			}
		} catch (e) {
			toast.error(`Error: ${e}`);
			console.error(`Error Getting Favorite Sources from System: ${e}`);
			runningFavoriteSources = [{
				name: 'No Favorites. Enter Source Name Here',
				url: 'Enter Source IP and Port here (e.g. 192.168.1.2:5961)'
			}];
		}
	}

	async function viewFavoriteSources() {
		// Update favorite sources to DOM
		if (!runningFavoriteSources || runningFavoriteSources.length == 0) {
			await getFavoriteSourcesFromSystem();
		}

		// Map favorite sources to modal select
		const options = runningFavoriteSources.map(source => ({
			label: source.name,
			value: source.url
		}));

		// Select from favorites
		const updateFavoriteSource = await modal.select(
			'Select Source:',
			options,
			null,
			'Modify Favorite NDI Sources',
			{
				confirmText: 'Next',
				cancelText: 'Done'
			}
		);
		// Close if 'Done' is selected.
		if (updateFavoriteSource === null || updateFavoriteSource === undefined) return;
		
		// Select the favorite source record.
		let selectedFavoriteSource = runningFavoriteSources.find(s => s.url === updateFavoriteSource);
		
		// Prompt to modify name of source.
		const modName = await modal.prompt(
			`<div style='margin-bottom:16px;'><pre style='margin:0; line-height:20px; font-size:85%;'><code>` +
			`<font style='font-weight:800; color:#4ade80;'>Name:</font> ${selectedFavoriteSource.name}
	` +
			`Url:  ${selectedFavoriteSource.url}` +
			`</code></pre></div>Name:`,
			selectedFavoriteSource.name, 
			'Update Favorite NDI',
			{
				confirmText: 'Next',
				cancelText: 'Back'
			}
		);
		// Return if 'Back' is selected.
		if (modName === null || modName === undefined) {
			viewFavoriteSources();
			return;
		} else {
			selectedFavoriteSource.name = modName;
		}

		// Prompt to modify url of source.
		const modUrl = await modal.prompt(
			`<div style='margin-bottom:16px;'><pre style='margin:0; line-height:20px; font-size:85%; color:#888'><code>` +
			`Name: ${selectedFavoriteSource.name}
	` +
			`<font style='font-weight:800; color:#4ade80;'>Url:</font>  ${selectedFavoriteSource.url}` +
			`</code></pre></div>Url:`,
			selectedFavoriteSource.url,
			'Update Favorite NDI',
			{
				confirmText: 'Save Changes',
				cancelText: 'Cancel'
			}
		);
		
		// Return if 'Cancel' is selected.
		if (modUrl === null || modUrl === undefined) {
			viewFavoriteSources();
			return;
		} else {
			selectedFavoriteSource.url = modUrl;
		}

		// Publish changes.
		await publishFavoriteSources();

		// Return to source selection.
		viewFavoriteSources();
	}

	async function publishFavoriteSources() {
		try {
			const res = await fetch(`/api/favorite-ndi-sources`, {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify(runningFavoriteSources)
			});
			if (res.ok) {
				toast.success('Favorite Source List Updated!');
			} else {
				toast.error('Failed to update source');
			}
		} catch (e) {
			console.error('Error updating favorite NDI source:', e);
			toast.error('Error updating source.');
		}
	}

	function saveScreenSaverSettings() {
		const settings = getScreenSaverSettings();
		const minutes = parseFloat(document.getElementById('screenSaverWait').value);
		if (isNaN(minutes) || minutes < 0.5) {
			toast.error('Please enter a valid duration (minimum 0.5 minutes)');
			return;
		}
		settings.inactivityMinutes = minutes;
		localStorage.setItem('ndpi_screensaver_settings', JSON.stringify(settings));
		window.dispatchEvent(new CustomEvent('screensaver-settings-updated', { detail: settings }));
	}

	function initializeScreenSaverSettings() {
		const settings = getScreenSaverSettings();
		document.getElementById('screenSaverWait').value = settings.inactivityMinutes;
		renderSchedules();
	}

	function renderSchedules() {
		const settings = getScreenSaverSettings();
		const list = document.getElementById('scheduleList');
		
		if (settings.disableSchedules.length === 0) {
			list.innerHTML = '<p style="font-size:11px; color:#666; font-style:italic;">No schedules configured</p>';
			return;
		}
		
		list.innerHTML = settings.disableSchedules.map((schedule, idx) => {
			const days = schedule.days.length === 7 ? 'Every day' : 
				schedule.days.map(d => ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d]).join(', ');
			return `
				<div style="display:flex; justify-content:space-between; align-items:center; padding:10px; background:rgba(255,255,255,0.05); border-radius:6px;">
					<div>
						<div style="font-size:13px; font-weight:600; color:#eee;">${schedule.startTime} - ${schedule.endTime}</div>
						<div style="font-size:11px; color:#888;">
							${days}
						</div>
					</div>
					<button onclick="removeSchedule(${idx})" class="button-danger" style="padding:6px 12px; font-size:11px;">
						<svg xmlns="http://www.w3.org/2000/svg" class="button-svg" width="16" height="16" fill="currentColor" class="bi bi-trash3" viewBox="0 0 16 16">
							<path d="M6.5 1h3a.5.5 0 0 1 .5.5v1H6v-1a.5.5 0 0 1 .5-.5M11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3A1.5 1.5 0 0 0 5 1.5v1H1.5a.5.5 0 0 0 0 1h.538l.853 10.66A2 2 0 0 0 4.885 16h6.23a2 2 0 0 0 1.994-1.84l.853-10.66h.538a.5.5 0 0 0 0-1zm1.958 1-.846 10.58a1 1 0 0 1-.997.92h-6.23a1 1 0 0 1-.997-.92L3.042 3.5zm-7.487 1a.5.5 0 0 1 .528.47l.5 8.5a.5.5 0 0 1-.998.06L5 5.03a.5.5 0 0 1 .47-.53Zm5.058 0a.5.5 0 0 1 .47.53l-.5 8.5a.5.5 0 1 1-.998-.06l.5-8.5a.5.5 0 0 1 .528-.47M8 4.5a.5.5 0 0 1 .5.5v8.5a.5.5 0 0 1-1 0V5a.5.5 0 0 1 .5-.5"/>
						</svg>
					</button>
				</div>
			`;
		}).join('');
	}

	async function addSchedule() {
		let startTime = '';
		let endTime = '';
		let days = [0, 1, 2, 3, 4, 5, 6];
		
		const html = `
			<div style="display:flex; flex-direction:column; gap:12px;">
				<div>
					<label style="font-size:12px; color:#eee; display:block; margin-bottom:4px;">Start Time</label>
					<input type="time" id="scheduleStart" style="width:100%; padding:8px; background:#1a1a1a; border:2px solid #444; border-radius:8px; color:#eee; font-size:14px;">
				</div>
				<div>
					<label style="font-size:12px; color:#eee; display:block; margin-bottom:4px;">End Time</label>
					<input type="time" id="scheduleEnd" style="width:100%; padding:8px; background:#1a1a1a; border:2px solid #444; border-radius:8px; color:#eee; font-size:14px;">
				</div>
				<div>
					<label style="font-size:12px; color:#eee; display:block; margin-bottom:6px;">Days</label>
					<div style="display:flex; gap:8px; flex-wrap:wrap;">
						${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map((day, idx) => `
							<label style="display:flex; align-items:center; gap:4px; font-size:11px; color:#eee; cursor:pointer; padding:4px 8px; background:#1a1a1a; border-radius:4px;">
								<input type="checkbox" class="scheduleDay" value="${idx}" checked style="cursor:pointer;">
								${day}
							</label>
						`).join('')}
					</div>
				</div>
			</div>
		`;
		
		const confirmed = await modal.custom(html, 'Add Disable Schedule', { 
			confirmText: 'Add',
			onOpen: () => {
				const startInput = document.getElementById('scheduleStart');
				const endInput = document.getElementById('scheduleEnd');
				
				startTime = startInput.value;
				endTime = endInput.value;
				
				startInput.addEventListener('input', (e) => {
					startTime = e.target.value;
				});
				endInput.addEventListener('input', (e) => {
					endTime = e.target.value;
				});
				document.querySelectorAll('.scheduleDay').forEach(cb => {
					cb.addEventListener('change', () => {
						days = Array.from(document.querySelectorAll('.scheduleDay:checked')).map(c => parseInt(c.value));
					});
				});
			}
		});
		if (!confirmed) return;
		
		if (!startTime || !endTime) {
			toast.error('Please enter both start and end times');
			return;
		}
		
		if (days.length === 0) {
			toast.error('Please select at least one day');
			return;
		}
		
		const settings = getScreenSaverSettings();
		settings.disableSchedules.push({ startTime, endTime, days });
		localStorage.setItem('ndpi_screensaver_settings', JSON.stringify(settings));
		renderSchedules();
		toast.success('Schedule added');
		window.dispatchEvent(new CustomEvent('screensaver-settings-updated', { detail: settings }));

	function removeSchedule(idx) {
		const settings = getScreenSaverSettings();
		settings.disableSchedules.splice(idx, 1);
		localStorage.setItem('ndpi_screensaver_settings', JSON.stringify(settings));
		renderSchedules();
		toast.success('Schedule removed');
		window.dispatchEvent(new CustomEvent('screensaver-settings-updated', { detail: settings }));
	}

	// UI Scale Functions
	function initializeScale() {
		const savedScale = localStorage.getItem('ndpi_ui_scale') || '100';
		const scaleSlider = document.getElementById('scaleSlider');
		const scaleValue = document.getElementById('scaleValue');
		
		if (!scaleSlider || !scaleValue) {
			setTimeout(initializeScale, 200);
			return;
		}
		
		scaleSlider.value = savedScale;
		scaleValue.value = savedScale;
		applyScale(savedScale);

		let debounceTimer;

		// Scale Entry Method
		scaleValue.addEventListener('input', function() {
			let scale = Math.max(this.value, 50);
			scale = Math.min(scale, 200);
			scaleSlider.value = scale;
			clearTimeout(debounceTimer);
			debounceTimer = setTimeout(() => {
				scaleValue.value = scale;
				applyScale(scale);
				localStorage.setItem('ndpi_ui_scale', scale);
			}, 2000);
		});
		/*
		scaleValue.addEventListener('change', function() {
			const scale = this.value;
			scaleSlider.value = scale;
			applyScale(scale);
			localStorage.setItem('ndpi_ui_scale', scale);
		});
		*/

		// Scale Slider Entry Method
		scaleSlider.addEventListener('input', function() {
			const scale = this.value;
			scaleValue.value = scale;
		});
		scaleSlider.addEventListener('change', function() {
			const scale = this.value;
			applyScale(scale);
			localStorage.setItem('ndpi_ui_scale', scale);
		});
	}

	function applyScale(scale) {
		const scaleDecimal = scale / 100;
		document.body.style.zoom = scaleDecimal;
		// Fallback for browsers that don't support zoom
		if (!document.body.style.zoom) {
			document.body.style.transform = `scale(${scaleDecimal})`;
			document.body.style.transformOrigin = 'top left';
		}
	}

	function resetScale() {
		const resetTo = 100;
		document.getElementById('scaleSlider').value = resetTo;
		document.getElementById('scaleValue').value = resetTo;
		applyScale(resetTo);
		localStorage.setItem('ndpi_ui_scale', `${resetTo}`);
	}

	// Roku TV Management Functions
	let rokuTvs = [];
	let groups = [];

	async function loadRokuTvs() {
		try {
			const [rokuRes, groupsRes] = await Promise.all([
				fetch('/api/roku-tvs'),
				fetch('/api/groups')
			]);
			if (!groupsRes.ok) throw new Error('Failed to fetch groups');
			if (!rokuRes.ok) throw new Error('Failed to fetch Roku TVs');

			const rokuData = await rokuRes.json();
			const groupsData = await groupsRes.json();
			
			rokuTvs = rokuData.rokuTvs || [];
			groups = groupsData.groups || [];
			
			renderRokuTvs();
		} catch (e) {
			console.error('Failed to load Roku TVs:', e);
		}
	}

	function renderRokuTvs() {
		const container = document.getElementById('rokuTvList');
		
		if (rokuTvs.length === 0) {
			container.innerHTML = '<p style="color:#888;font-size:12px;">No Roku TVs added yet</p>';
			return;
		}
		
		container.innerHTML = rokuTvs.map(tv => {
			const group = groups.find(g => g.id === tv.groupId);
			const groupName = group ? group.name : 'Unknown Group';
			
			return `
				<div style="display:flex; justify-content:space-between; align-items:center; padding:10px; background:rgba(255,255,255,0.05); border-radius:6px;">
					<div>
						<div style="font-size:13px; font-weight:600; color:#eee;">${tv.displayName}</div>
						<div style="font-size:11px; color:#888;">
							${tv.ipAddress} • ${tv.model || 'Unknown Model'} • Group: ${groupName}
						</div>
					</div>
					<button onclick="removeRokuTv('${tv.id}')" class="button-danger" style="padding:6px 12px; font-size:11px;">
						<svg xmlns="http://www.w3.org/2000/svg" class="button-svg" width="16" height="16" fill="currentColor" class="bi bi-trash3" viewBox="0 0 16 16">
							<path d="M6.5 1h3a.5.5 0 0 1 .5.5v1H6v-1a.5.5 0 0 1 .5-.5M11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3A1.5 1.5 0 0 0 5 1.5v1H1.5a.5.5 0 0 0 0 1h.538l.853 10.66A2 2 0 0 0 4.885 16h6.23a2 2 0 0 0 1.994-1.84l.853-10.66h.538a.5.5 0 0 0 0-1zm1.958 1-.846 10.58a1 1 0 0 1-.997.92h-6.23a1 1 0 0 1-.997-.92L3.042 3.5zm-7.487 1a.5.5 0 0 1 .528.47l.5 8.5a.5.5 0 0 1-.998.06L5 5.03a.5.5 0 0 1 .47-.53Zm5.058 0a.5.5 0 0 1 .47.53l-.5 8.5a.5.5 0 1 1-.998-.06l.5-8.5a.5.5 0 0 1 .528-.47M8 4.5a.5.5 0 0 1 .5.5v8.5a.5.5 0 0 1-1 0V5a.5.5 0 0 1 .5-.5"/>
						</svg>
					</button>
				</div>
			`;
		}).join('');
	}

	async function addRokuTv() {
		// Get IP address
		const ipAddress = await modal.prompt('Enter Roku TV IP address:', '', 'Add Roku TV');
		if (!ipAddress) return;
		
		// Validate IP format
		const ipPattern = /^(\d{1,3}\.){3}\d{1,3}$/;
		if (!ipPattern.test(ipAddress)) {
			toast.error('Invalid IP address format');
			return;
		}
		
		// Fetch device info from Roku
		toast.info('Fetching device information...');
		
		try {
			console.log(`Fetching device info from http://${ipAddress}:8060/query/device-info`);
			const response = await fetch(`http://${ipAddress}:8060/query/device-info`, {
				method: 'GET',
				headers: { 
					'Accept': 'application/xml'
				}
			});
			if (!response.ok) {
				toast.error('Failed to connect to Roku TV. Check IP address.');
				return;
			}
			
			const xmlText = await response.text();
			const parser = new DOMParser();
			const xmlDoc = parser.parseFromString(xmlText, 'application/xml');
			
			const getTagText = (tagName) => xmlDoc.getElementsByTagName(tagName)[0]?.textContent || '';
			
			const deviceInfo = {
				friendlyName: getTagText('friendly-device-name') || getTagText('user-device-name') || 'Roku TV',
				model: getTagText('model-name'),
				manufacturer: getTagText('vendor-name') || 'Roku',
				screenSize: getTagText('screen-size'),
				deviceType: getTagText('is-tv') === 'true' ? 'TV' : 'Device'
			};
			
			// Select group
			if (groups.length === 0) {
				toast.error('No groups available. Create a group first.');
				return;
			}
			
			const groupOptions = groups.map(g => ({ value: g.id, label: g.name }));
			const groupId = await modal.select('Select group for this Roku TV:', groupOptions, null, 'Add Roku TV');
			
			if (!groupId) return;
			
			// Save to server
			const res = await fetch('/api/roku-tv', {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({
					displayName: deviceInfo.friendlyName,
					ipAddress,
					model: deviceInfo.model,
					manufacturer: deviceInfo.manufacturer,
					deviceType: deviceInfo.deviceType,
					screenSize: deviceInfo.screenSize,
					groupId
				})
			});
			
			if (res.ok) {
				toast.success('Roku TV added successfully');
				loadRokuTvs();
			} else {
				const data = await res.json();
				toast.error(data.error || 'Failed to add Roku TV');
			}
		} catch (e) {
			console.error('Error adding Roku TV:', e);
			toast.error('Failed to connect to Roku TV');
		}
	}

	async function removeRokuTv(id) {
		const tv = rokuTvs.find(t => t.id === id);
		if (!tv) return;
		
		const confirmed = await modal.confirm(
			`Remove "${tv.displayName}" from Roku TV management?`,
			'Remove Roku TV',
			{ danger: true, confirmText: 'Remove' }
		);
		
		if (!confirmed) return;
		
		try {
			const res = await fetch(`/api/roku-tv/${id}`, { method: 'DELETE' });
			
			if (res.ok) {
				toast.success('Roku TV removed');
				loadRokuTvs();
			} else {
				toast.error('Failed to remove Roku TV');
			}
		} catch (e) {
			toast.error('Error removing Roku TV');
		}
	}
