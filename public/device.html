	let device = null;
	let sources = [];

	async function loadDevice() {
		const params = new URLSearchParams(window.location.search);
		const deviceId = params.get('id');
		
		if (!deviceId) {
			window.location.href = '/';
			return;
		}

		try {
			const [devRes, srcRes, grpRes] = await Promise.all([
				fetch('/api/devices'),
				fetch('/api/ndi-sources'),
				fetch('/api/groups')
			]);
			
			const devData = await devRes.json();
			sources = await srcRes.json();
			const grpData = await grpRes.json();
			groups = grpData.groups || [];
			
			device = devData.devices.find(d => d.id === deviceId || d.deviceId === deviceId);
			
			if (!device) {
				document.getElementById('deviceContent').innerHTML = '<p style="color: #dc5050;">Device not found</p>';
				return;
			}
			renderDevice();
		} catch (e) {
			console.error('Error loading device:', e);
			document.getElementById('deviceContent').innerHTML = '<p style="color: #dc5050;">Error loading device</p>';
		}
	}

	function formatUptime(seconds) {
		if (!seconds || seconds < 0) return '0s';
		const hours = Math.floor(seconds / 3600);
		const minutes = Math.floor((seconds % 3600) / 60);
		const secs = seconds % 60;
		
		if (hours > 0) {
			return `${hours}h ${minutes}m ${secs}s`;
		} else if (minutes > 0) {
			return `${minutes}m ${secs}s`;
		}
		return `${secs}s`;
	}

	function parseNdiUrl(url) {
		// Parse NDI URL like "192.168.1.100:5961" or "ndi://hostname/source"
		if (!url) return { ip: 'Unknown', port: 'Unknown' };
		const match = url.match(/^(?:ndi:\/\/)?([^:\/]+)(?::(\d+))?/);
		if (match) {
			return { ip: match[1], port: match[2] || '5961' };
		}
		return { ip: url, port: '5961' };
	}

	function parseSourceName(name) {
		// Parse source name like "HOSTNAME (SourceName)" 
		const match = name.match(/^(.+?)\s*\((.+)\)$/);
		if (match) {
			return { hostname: match[1], sourceName: match[2] };
		}
		return { hostname: name, sourceName: 'Default' };
	}

	function renderSources() {
		const sourceGrid = document.getElementById('deviceSourceGrid');

		const curSource = device.currentSource || 'None';

		const noneCard = `
			<div>
				<div class="source-card ${curSource == 'None' ? 'selected' : ''}" data-source="" onclick="selectSource('')">
					<div class="source-name">None</div>
					<div class="source-host">No source assigned</div>
					<div class="source-info">
						<div>░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░</div>
						<div>░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░</div>
					</div>
					${curSource == 'None' ? '<div class="source-selected-badge" style="background:#666;">Current</div>' : ''}
				</div>
			</div>
		`;

		const favSrcBadge = `
			<div class="source-info favorite">
				<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-star-fill" viewBox="0 0 16 16">
					<path d="M3.612 15.443c-.386.198-.824-.149-.746-.592l.83-4.73L.173 6.765c-.329-.314-.158-.888.283-.95l4.898-.696L7.538.792c.197-.39.73-.39.927 0l2.184 4.327 4.898.696c.441.062.612.636.282.95l-3.522 3.356.83 4.73c.078.443-.36.79-.746.592L8 13.187l-4.389 2.256z"></path>
				</svg>
			</div>
		`;

		const sourceCards = sources.length > 0 ? sources.map(src => {
			const parsed = parseSourceName(src.name);
			const urlInfo = parseNdiUrl(src.url);
			const isSelected = device.currentSource === src.name;
			return `
				<div>
					<div class="source-card ${isSelected ? 'selected' : ''}" onclick="selectSource('${src.name.replace(/'/g, "\\'")}')">
						${src.favorite ? favSrcBadge : ''}
						<div class="source-name">${parsed.sourceName}</div>
						<div class="source-host">${parsed.hostname}</div>
						<div class="source-info">
							<span>IP: ${urlInfo.ip}</span>
							<span>Port: ${urlInfo.port}</span>
						</div>
						${isSelected ? '<div class="source-selected-badge">Current</div>' : ''}
					</div>
				</div>
			`;
		}).join('') : '<p style="color:#888;grid-column:1/-1;">No NDI sources found on network</p>';

		sourceGrid.innerHTML = noneCard + sourceCards;
	}

	function updateDevice() {
		if (!device) return;

			const tempColor = device.systemStats.temperature > 78 ? '#f87171' : device.systemStats.temperature > 65 ? '#fbbf24' : '#4ade80';
			const tempF = ((device.systemStats.temperature * 9/5) + 32).toFixed(0);
			
			statsHeader.innerHTML = `
				<!--div style="display:flex;gap:24px;align-items:flex-start;font-size:14px;background:rgba(255,255,255,0.03);padding:12px 20px;border-radius:12px;"-->
					<div style="display:flex;flex-direction:column;align-items:center;gap:2px;">

						<span style="color:${cpuColor};font-weight:600;font-size:16px;">${device.systemStats.cpu}%</span>
					</div>
					<div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
						<span style="color:#888;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;">TEMP</span>
						<span style="color:${tempColor};font-weight:600;font-size:16px;">${tempF}°F</span>
					</div>
					<div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
						<span style="color:#888;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;">MEM</span>
						<span style="color:${memColor};font-weight:600;font-size:16px;">${device.systemStats.memory.percent}%</span>
					</div>

						<span style="color:#888;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;">Uptime</span>
						<span style="color:#4ade80;font-weight:600;font-size:16px;">${formatUptime(device.systemStats.uptime)}</span>

					<span class="info-label">Device ID</span>

				</div>
				<div class="info-item">
					<span class="info-label">Group</span>
					<span class="info-value" style="display:flex;align-items:center;gap:8px;">
						${device.group || 'None'}
						<button onclick="changeGroup()" style="background:none;border:none;cursor:pointer;padding:2px;opacity:0.5;transition:opacity 0.2s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.5'" title="Change Group">
							<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
								<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
								<path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>

					<span class="info-value" style="color:${statusColor};text-transform: uppercase;">${device.status}</span>
				</div>
				<div class="info-item">
					<span class="info-label">Stream Status</span>
					<span class="info-value" style="text-transform: capitalize;color:${device.streamStatus === 'streaming' ? '#4ade80' : '#888'};">${device.streamStatus || 'idle'}</span>
				</div>
				${device.ndiInfo && device.ndiInfo.resolution ? `
				<div class="info-item">

	async function selectSource(sourceName) {
		try {
			const res = await fetch(`/api/device/${device.id}`, {
				method: 'PUT',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ currentSource: sourceName })
			});
			if (res.ok) {
				// Update local state immediately for responsive UI
				device.currentSource = sourceName;
				renderSources();
				updateDevice();
				if (sourceName !== '') {
					toast.success(`Source set to ${sourceName}`);
				}
			} else {
				toast.error('Failed to assign source');
			}
		} catch (e) {
			toast.error('Error assigning source');
		}
	}

	async function renameDevice() {
		const newName = await modal.prompt('Enter new device name:', device.name, 'Rename Device');
		if (!newName || newName === device.name) {
			toast.info('Device name will remain unchanged.');
			return;
		}
		
		try {
			const resDevice = await fetch(`http://${device.ip}:3001/api/deviceName`, {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ deviceName: newName })
			});
			if (!resDevice.ok) {
				toast.warning('Failed to update device name.');
				return;
			}
			const res = await fetch(`/api/device/${device.id}`, {
				method: 'PUT',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ deviceName: newName })
			});
			if (res.ok) {
				toast.success('Device renamed');
				loadDevice();
			} else {
				toast.error('Failed to rename device');
			}
		} catch (e) {
			toast.error('Error renaming device');
		}
	}

	async function changeGroup() {
		// Build options list
		const options = [{ value: '', label: 'None (No Group)' }];
		groups.forEach(g => {
			options.push({ value: g.id, label: g.name });
		});
		
		// Find current group ID
		const currentGroup = groups.find(g => g.name === device.group);
		const currentGroupId = currentGroup ? currentGroup.id : '';
		
		const selected = await modal.select('Select a group for this device:', options, currentGroupId, 'Change Group');
		if (selected === null || selected === undefined) return;
		
		try {
			// If device was in a group, remove it
			if (currentGroup) {
				await fetch(`/api/group/${currentGroup.id}/remove-device`, {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ deviceId: device.id })
				});
			}
			
			// If new group selected (not 'None'), add device to it
			if (selected) {
				const res = await fetch(`/api/group/${selected}/add-device`, {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ deviceId: device.id })
				});
				
				if (res.ok) {
					const newGroup = groups.find(g => g.id === selected);
					toast.success(`Added to group "${newGroup.name}"`);
				} else {
					toast.error('Failed to add to group');
				}
			} else {
				toast.success('Removed from group');
			}
			
			loadDevice();
		} catch (e) {
			toast.error('Error changing group');
		}
	}

	async function shutdownDevice() {
		const confirmed = await modal.confirm('Are you sure you want to shutdown this device?', 'Shutdown Device', { danger: true, confirmText: 'Shutdown' });
		if (!confirmed) return;
		
		try {
			const res = await fetch(`/api/device/${device.id}/shutdown`, { method: 'POST' });
			if (res.ok) {
				toast.info('Shutdown command sent');
			} else {
				toast.error('Failed to send shutdown command');
			}
		} catch (e) {
			toast.error('Error sending shutdown command');
		}
	}

	async function rebootDevice() {
		const confirmed = await modal.confirm('Are you sure you want to reboot this device?', 'Reboot Device', { danger: true, confirmText: 'Reboot' });
		if (!confirmed) return;
		
		try {
			const res = await fetch(`/api/device/${device.id}/reboot`, { method: 'POST' });
			if (res.ok) {
				toast.info('Reboot command sent');
			} else {
				toast.error('Failed to send reboot command');
			}
		} catch (e) {
			toast.error('Error sending reboot command');
		}
	}

	async function forgetDevice() {
		const confirmed = await modal.confirm('Are you sure you want to forget this device? It can be re-added later.', 'Forget Device', { danger: true, confirmText: 'Forget' });
		if (!confirmed) return;
		
		try {
			const res = await fetch(`/api/device/${device.id}`, { method: 'DELETE' });
			if (res.ok) {
				toast.success('Device forgotten');
				setTimeout(() => window.location.href = '/', 500);
			} else {
				toast.error('Failed to forget device');
			}
		} catch (e) {
			toast.error('Error forgetting device');
		}
	}

	async function showNetworkSettings() {
		const config = await modal.prompt(
			'Network Configuration (JSON format)',
			JSON.stringify({
				mode: 'dhcp',
				staticIP: '',
				subnet: '255.255.255.0',
				gateway: '',
				dns: '8.8.8.8',
				wifiSSID: '',
				wifiPassword: ''
			}, null, 2),
			'Configure Network'
		);
		
		if (!config) return;
		
		try {
			const networkConfig = JSON.parse(config);
			const res = await fetch(`/api/device/${device.id}/network`, {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify(networkConfig)
			});
			
			if (res.ok) {
				toast.success('Network settings sent to device. Device may reconnect with new IP.');
			} else {
				toast.error('Failed to apply network settings');
			}
		} catch (e) {
			toast.error('Invalid JSON format');
		}
	}

	loadDevice();

	// Initialize WebSocket connection
	const ws = initWebSocket();

	const pageLogo = document.getElementById('topbarLogo');
	const topbarHeight = document.querySelector('.topbar').clientHeight;
	pageLogo.style.width = topbarHeight ? `${topbarHeight - 10}px` : `100px`;
	pageLogo.style.height = topbarHeight ? `${topbarHeight - 10}px` : `100%`;

	// Handle device updates from WebSocket - update stats and info only
	ws.onDevicesUpdate = (devices) => {
		if (!device) return;
		const updatedDevice = devices.find(d => d.id === device.id);
		let curDeviceInfo = device;
		let updateDeviceInfo = updatedDevice;
		if (updatedDevice) {
			if (JSON.stringify(device.systemStats) !== JSON.stringify(updatedDevice.systemStats)) {
				console.log('updating system stats');
			}
			curDeviceInfo.systemStats = null
			updateDeviceInfo.systemStats = null;
			if (JSON.stringify(curDeviceInfo) !== JSON.stringify(updateDeviceInfo)) {
				console.log('updating device info');
			}
			if (JSON.stringify(device) !== JSON.stringify(updatedDevice)) {
				device = updatedDevice;
				updateDevice();
			}
		}
	};

	// Handle NDI source updates from WebSocket
	ws.onNDISourceUpdate = (sourcesUpdate) => {
		if (JSON.stringify(sources) !== JSON.stringify(sourcesUpdate)) {
			sources = sourcesUpdate;
			renderSources();
		}
	};

</script>
</body>
</html>
