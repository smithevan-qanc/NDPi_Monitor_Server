	async function loadGroup() {
		const params = new URLSearchParams(window.location.search);
		const groupId = params.get('id');
		
		if (!groupId) {
			window.location.href = '/';
			return;
		}

		try {
			const [grpRes, srcRes, devRes, rokuRes] = await Promise.all([
				fetch('/api/groups'),
				fetch('/api/ndi-sources'),
				fetch('/api/devices'),
				fetch('/api/roku-tvs')
			]);
			
			const grpData = await grpRes.json();
			sources = await srcRes.json();
			const devData = await devRes.json();
			const rokuData = await rokuRes.json();
			allDevices = devData.devices || [];
			
			group = grpData.groups.find(g => g.id === groupId);
			
			if (!group) {
				document.getElementById('groupContent').innerHTML = '<p style="color: #dc5050;">Group not found</p>';
				return;
			}
			
			// Filter Roku TVs for this group
			const allRokuTvs = rokuData.rokuTvs || [];
			groupRokuTvs = allRokuTvs.filter(tv => tv.groupId === groupId);
			
			// Enrich group devices with full device data
			group.devices = group.devices.map(gDev => {
				const fullDevice = allDevices.find(d => (d.id || d.deviceId) === (gDev.id || gDev.deviceId));
				return fullDevice ? { ...gDev, ...fullDevice } : gDev;
			});
			
			if (isInitialLoad) {
				renderGroup();
				startWave();
				isInitialLoad = false;
			} else {
				updateGroupDisplay();
			}
		} catch (e) {
			console.error('Error loading group:', e);
			document.getElementById('groupContent').innerHTML = '<p style="color: #dc5050;">Error loading group</p>';
		}
	}

	function parseNdiUrl(url) {
		if (!url) return { ip: 'Unknown', port: 'Unknown' };
		const match = url.match(/^(?:ndi:\/\/)?([^:\/]+)(?::(\d+))?/);
		if (match) {
			return { ip: match[1], port: match[2] || '5961' };
		}
		return { ip: url, port: '5961' };
	}

	function parseSourceName(name) {
		const match = name.match(/^(.+?)\s*\((.+)\)$/);
		if (match) {
			return { hostname: match[1], sourceName: match[2] };
		}
		return { hostname: name, sourceName: 'Default' };
	}

	function updateGroupHeaderStats() {
		document.getElementById('groupName').textContent = group.name;
		document.getElementById('deviceCount').textContent = group.devices.length;
		
		const curSource = group.currentSource || 'None';
		const curSourceEl = document.getElementById('currentSourceDisplay');
		if (curSource !== 'None') {
			curSourceEl.style.color = 'rgb(129, 193, 39)';
			curSourceEl.style.fontWeight = 600;
			curSourceEl.style.letterSpacing = 'inherit';
			curSourceEl.textContent = curSource || '';
		} else {
			curSourceEl.style.color = '#888';
			curSourceEl.style.fontWeight = 400;
			curSourceEl.style.letterSpacing = '-1px';
			curSourceEl.textContent = '⸻⸻⸻';
		}
	}
	function updateGroupDisplay() {
		updateGroupHeaderStats();

		const curSource = group.currentSource || 'None';

		// Update source selection highlights
		document.querySelectorAll('.source-card').forEach(card => {

			const sourceName = card.dataset.source;

			const isSelected = (sourceName === '' && curSource == 'None') || sourceName === group.currentSource;

			card.classList.toggle('selected', isSelected);
			
			const badge = card.querySelector('.source-selected-badge');
			if (badge) badge.remove();
			
			if (isSelected) {
				const newBadge = document.createElement('div');
				newBadge.className = 'source-selected-badge';
				newBadge.style.background = sourceName === '' ? '#666' : 'rgb(129, 193, 39)';
				newBadge.textContent = 'Current';
				card.appendChild(newBadge);
			}
		});
		
		// Update devices list
		updateDevicesList();
	}

	function updateDevicesList() {
		const container = document.getElementById('devicesContainer');
		if (!container) return;
		
		if (group.devices.length === 0) {
			container.innerHTML = '<p style="color:#888;">No devices in this group</p>';
			return;
		}
		
		// Check if we need to rebuild or just update stats
		const existingTiles = container.querySelectorAll('.device-tile');
		const deviceIds = group.devices.map(d => d.id || d.deviceId);
		const existingIds = Array.from(existingTiles).map(t => t.dataset.deviceId);
		
		// If device list changed, rebuild
		const needsRebuild = existingTiles.length !== group.devices.length || 
			!deviceIds.every((id, i) => id === existingIds[i]);
		
		if (needsRebuild) {
			container.innerHTML = group.devices.map(dev => buildDeviceTileHtml(dev)).join('');
		} else {
			// Just update stats in place
			group.devices.forEach(dev => {
				const tile = container.querySelector(`[data-device-id="${dev.id || dev.deviceId}"]`);
				if (tile) {
					const statsContainer = tile.querySelector('.device-stats');
					
					if (dev.status === 'online') {
						tile.classList.add('active');
					} else {
						tile.classList.remove('active');
					}

					if (dev.systemStats && dev.status === 'online') {
						const cpuColor = dev.systemStats.cpu > 80 ? '#f87171' : dev.systemStats.cpu > 50 ? '#fbbf24' : '#4ade80';
						const tempColor = dev.systemStats.temperature > 78 ? '#f87171' : dev.systemStats.temperature > 65 ? '#fbbf24' : '#4ade80';
						const memColor = dev.systemStats.memory.percent > 80 ? '#f87171' : dev.systemStats.memory.percent > 50 ? '#fbbf24' : '#4ade80';
						const tempF = ((dev.systemStats.temperature * 9/5) + 32).toFixed(0);
						const statsHtml = `
							<span style="color:${cpuColor};">CPU ${dev.systemStats.cpu}%</span>
							<span style="color:${tempColor};">TEMP ${tempF}°F</span>
							<span style="color:${memColor};">MEM ${dev.systemStats.memory.percent}%</span>
						`;
						if (statsContainer) {
							statsContainer.innerHTML = statsHtml;
						} else {
							// Add stats container if it doesn't exist
							const main = tile.querySelector('.devices-grid');
							if (main) {
								const newStats = document.createElement('div');
								newStats.className = 'device-stats';
								newStats.innerHTML = statsHtml;
								main.appendChild(newStats);
							}
						}
					} else if (statsContainer) {
						statsContainer.remove();
					}

					const statusSpan = tile.querySelector('.device-tile-name span:nth-child(1)');
					if (statusSpan) {
						statusSpan.style.color = dev.status == 'online' ? 'rgb(129, 193, 39)' : '#888';
						statusSpan.textContent = dev.status;
					}
				}
			});
		}
	}

	function buildDeviceTileHtml(dev) {
		const statusColor = dev.status === 'online' ? 'rgb(129, 193, 39)' : '#888';
		let statsHtml = '';
		let removeButton = '';
		if (dev.systemStats && dev.status === 'online') {
			const cpuColor = dev.systemStats.cpu > 80 ? '#f87171' : dev.systemStats.cpu > 50 ? '#fbbf24' : '#4ade80';
			const tempColor = dev.systemStats.temperature > 70 ? '#f87171' : dev.systemStats.temperature > 55 ? '#fbbf24' : '#4ade80';
			const memColor = dev.systemStats.memory.percent > 80 ? '#f87171' : dev.systemStats.memory.percent > 50 ? '#fbbf24' : '#4ade80';
			const tempF = ((dev.systemStats.temperature * 9/5) + 32).toFixed(0);
			statsHtml = `
				<div class="device-stats">
					<span style="color:${cpuColor};">CPU ${dev.systemStats.cpu}%</span>
					<span style="color:${tempColor};">TEMP ${tempF}°F</span>
					<span style="color:${memColor};">MEM ${dev.systemStats.memory.percent}%</span>
				</div>
			`;
		}
		if (account.isAdmin) {
			removeButton = `<button class="device-tile-remove" onclick="event.stopPropagation(); removeDeviceFromGroup('${dev.id || dev.deviceId}', '${dev.name.replace(/'/g, "\\'")}')">Remove</button>`;
		}
		
		return `
			<div class="device-tile${dev.status === 'online' ? ' active' : ''}" data-device-id="${dev.id || dev.deviceId}" onclick="window.location.href='/device.html?id=${encodeURIComponent(dev.id || dev.deviceId)}'">
				<div class="device-tile-main">
					<div class="device-tile-name">
						<span style="text-transform:capitalize; color:${statusColor};">${dev.status}</span> 
						⌇ ${dev.name}
					</div>
					<div class="device-tile-info mono">
						<div style='flex:2;'><code>${dev.ip}</code></div>
						<div style='flex:4; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; ' title='${dev.currentSource || 'No Active Source'}'>
							${dev.currentSource || 'No Active Source'}
						</div>
					</div>
					${statsHtml}
				</div>
				${removeButton}
				<button class="device-tile-remove" onclick="cecPowerOn('${dev.ipAddress}')">
					TV Power |
					<span style="font-weight: 800;">ON</span>
				</button>
				<button class="device-tile-remove" onclick="cecPowerOff('${dev.ipAddress}')">
					TV Power |
					<span style="font-weight: 800;">OFF</span>
				</button>
			</div>
		`;
	}

						<path d="M3.612 15.443c-.386.198-.824-.149-.746-.592l.83-4.73L.173 6.765c-.329-.314-.158-.888.283-.95l4.898-.696L7.538.792c.197-.39.73-.39.927 0l2.184 4.327 4.898.696c.441.062.612.636.282.95l-3.522 3.356.83 4.73c.078.443-.36.79-.746.592L8 13.187l-4.389 2.256z"></path>
					</svg>
				</div>`;

				sourceCard.innerHTML = `
				<div id="${src.url}" class="source-card ${isSelected ? 'selected' : ''}" data-source="${src.name}" onclick="selectSource('${src.name.replace(/'/g, "\\'")}')">
					${src.favorite ? favSrcBadge : ''}
					<div class="source-name">${parsed.sourceName}</div>
					<div class="source-host">${parsed.hostname}</div>
					<div class="source-info">
						<span>IP: ${urlInfo.ip}</span>
						<span>Port: ${urlInfo.port}</span>
					</div>
					${isSelected ? '<div class="source-selected-badge">Current</div>' : ''}
				</div>
				`;
				sourceGridEl.appendChild(sourceCard);
			})
		} else {
			// ** GROUP DIDN'T LOAD WITH THE FOLLOWING LINE **
			//sourceGridEl.appendChild(noSourcesEl);
		}

		// Populate devices list
		updateDevicesList();
		startWave();
	}

	let waveStarted = false;

	function startWave() {
		if (waveStarted) return;
		waveStarted = true;
		setInterval(() => {
			const elemA = document.querySelectorAll('.n-src-a').forEach(function (el) {
				el.style.opacity = 0.5
			});
			const elemB = document.querySelectorAll('.n-src-b').forEach(function (el) {
				el.style.opacity = 0.5
			});
			const elemC = document.querySelectorAll('.n-src-c').forEach(function (el) {
				el.style.opacity = 0.5
			});
			setTimeout(() => {
				const elemA = document.querySelectorAll('.n-src-a').forEach(function (el) {
					el.style.opacity = 0.2
				});
				const elemB = document.querySelectorAll('.n-src-b').forEach(function (el) {
					el.style.opacity = 0.2
				});
				const elemV = document.querySelectorAll('.n-src-c').forEach(function (el) {
					el.style.opacity = 0.2
				});
			}, 2250);
		}, 4500);
	}

	async function cecPowerOn(deviceIp) {
		if (!deviceIp) return;
		try {
			const resDevice = await fetch(`http://${device.ip}:3001/api/cec/on`, {
				method: 'POST',
			});
			if (resDevice.ok) {
				toast.success('Powered On - Connected TV');
			} else {
				toast.warning('Failed to Power On - Connected TV');
			}
		} catch (e) {
			toast.error('Error Powerering On - Connected TV');
		}
	}
	async function cecPowerOff(deviceIp) {
		if (!deviceIp) return;
		try {
			const resDevice = await fetch(`http://${device.ip}:3001/api/cec/standby`, {
				method: 'POST',
			});
			if (resDevice.ok) {
				toast.success('Powered Off - Connected TV');
			} else {
				toast.warning('Failed to Power Off - Connected TV');
			}
		} catch (e) {
			toast.error('Error Powerering Off - Connected TV');
		}
	}

	async function selectSource(sourceName) {
		try {
			const res = await fetch(`/api/group/${group.id}`, {
				method: 'PUT',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ currentSource: sourceName })
			});
			if (res.ok) {
				group.currentSource = sourceName;
				updateGroupDisplay();
				if (sourceName !== '') {
					toast.success(`Source set to ${sourceName}`);
				}
			} else {
				toast.error('Failed to assign source to group');
			}
		} catch (e) {
			toast.error('Error assigning source to group');
		}
	}

	async function showGroupOverlay() {
		try {
			selectSource('');
			const res = await fetch(`/api/group/${group.id}/overlay`, { method: 'POST' });
			if (res.ok) {
				toast.info('Showing overlay on all devices');
			} else {
				toast.error('Failed to show overlay');
			}
		} catch (e) {
			toast.error('Error showing overlay');
		}
	}

	async function showGroupBlank() {
		try {
			selectSource('');
			const res = await fetch(`/api/group/${group.id}/blank`, { method: 'POST' });
			if (res.ok) {
				toast.info('Blanking all devices');
			} else {
				toast.error('Failed to blank displays');
			}

			toast.error('Error blanking displays');
		}

	async function shutdownGroup() {
		const confirmed = await modal.confirm(
			`Are you sure you want to shutdown all ${group.devices.length} device(s) in this group?`,
			'Shutdown Group',
			{ danger: true, confirmText: 'Shutdown All' }
		);
		if (!confirmed) return;
		
		try {
			const res = await fetch(`/api/group/${group.id}/shutdown`, { method: 'POST' });
			if (res.ok) {
				toast.info('Shutdown command sent to group');
			} else {
				toast.error('Failed to send shutdown command to group');
			}
		} catch (e) {
			toast.error('Error sending shutdown command to group');
		}

	async function rebootGroup() {
		const confirmed = await modal.confirm(
			`Are you sure you want to reboot all ${group.devices.length} device(s) in this group?`,
			'Reboot Group',
			{ danger: true, confirmText: 'Reboot All' }
		);
		if (!confirmed) return;
		
		try {
			const res = await fetch(`/api/group/${group.id}/reboot`, { method: 'POST' });
			if (res.ok) {
				toast.info('Reboot command sent to group');
			} else {
				toast.error('Failed to send reboot command to group');
			}
		} catch (e) {
			toast.error('Error sending reboot command to group');
		}
	}

	async function removeDeviceFromGroup(deviceId, deviceName) {
		const confirmed = await modal.confirm(
			`Remove "${deviceName}" from this group?`,
			'Remove Device',
			{ danger: true, confirmText: 'Remove' }
		);
		if (!confirmed) return;
		
		try {
			const res = await fetch(`/api/group/${group.id}/remove-device`, {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ deviceId })
			});
			
			if (res.ok) {
				// Update local state and refresh display
				group.devices = group.devices.filter(d => (d.id || d.deviceId) !== deviceId);
				document.getElementById('deviceCount').textContent = group.devices.length;
				updateDevicesList();
				toast.success('Device removed from group');
			} else {
				toast.error('Failed to remove device');
			}
		} catch (e) {
			toast.error('Error removing device');
		}
	}

	// Roku TV control functions
	async function powerDisplaysInGroup(action) {
		if (groupRokuTvs.length === 0) {
			toast.warning('No Roku TVs configured for this group');
			return;
		}
		
		const ipAddresses = groupRokuTvs.map(tv => tv.ipAddress);
		await rokuBulkKeypress(ipAddresses, action);
		
		toast.info(`Sent ${action} command to ${groupRokuTvs.length} Roku TV(s)`);
	}

	async function addDevicesToGroup() {
		try {
			// Get all devices from the server
			const devRes = await fetch('/api/devices');
			const devData = await devRes.json();
			const allDevs = devData.devices || [];
			
			// Filter out devices already in this group
			const groupDeviceIds = group.devices.map(d => d.id || d.deviceId);
			const availableDevices = allDevs.filter(device => 
				!groupDeviceIds.includes(device.id || device.deviceId)
			);
			
			if (availableDevices.length === 0) {
				toast.warning('No available devices to add');
				return;
			}
			
			// Create options list with value/label
			const options = availableDevices.map(device => ({
				value: device.id || device.deviceId,
				label: `${device.name} (${device.ip})`
			}));
			
			const selectedDeviceId = await modal.select('Select a device to add to this group:', options, null, 'Add Device');
			if (selectedDeviceId === null || selectedDeviceId === undefined) return;
			
			// Add device to group via API
			const res = await fetch(`/api/group/${group.id}/add-device`, {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ deviceId: selectedDeviceId })
			});
			
			if (res.ok) {
				toast.success('Device added to group');
				// WebSocket will update the group, triggering updateGroupDisplay
			} else {
				toast.error('Failed to add device to group');
			}
		} catch (e) {
			console.error('Error adding device to group:', e);
			toast.error('Error adding device to group');
		}
	}

	async function renameGroup() {
		const newName = await modal.prompt('Enter new group name:', group.name, 'Rename Group');
		if (!newName || newName === group.name) return;
		
		try {
			const res = await fetch(`/api/group/${group.id}`, {
				method: 'PUT',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ name: newName })
			});
			if (res.ok) {
				group.name = newName;
				document.getElementById('groupName').textContent = newName;
				toast.success('Group renamed');
			} else {
				toast.error('Failed to rename group');
			}
		} catch (e) {
			toast.error('Error renaming group');
		}
	}

	async function deleteGroup() {
		const confirmed = await modal.confirm(
			`Are you sure you want to delete the group "${group.name}"? This action cannot be undone.`,
			'Delete Group',
			{ danger: true, confirmText: 'Delete', cancelText: 'Cancel' }
		);
		
		if (!confirmed) return;
		
		try {
			const res = await fetch(`/api/group/${group.id}`, { method: 'DELETE' });
			
			if (res.ok) {
				toast.success('Group deleted');
				setTimeout(() => window.location.href = '/groups.html', 500);
			} else {
				toast.error('Failed to delete group');
			}
		} catch (e) {
			console.error('Error deleting group:', e);
			toast.error('Error deleting group');
		}
	}

	loadGroup();

	// Initialize WebSocket connection
	const ws = initWebSocket();

	const pageLogo = document.getElementById('topbarLogo');
	const topbarHeight = document.querySelector('.topbar').clientHeight;
	pageLogo.style.width = topbarHeight ? `${topbarHeight - 10}px` : `100px`;
	pageLogo.style.height = topbarHeight ? `${topbarHeight - 10}px` : `100%`;

	// Handle groups updates from WebSocket - only update display, don't rebuild
	ws.onGroupsUpdate = (groupList) => {
		const updatedGroup = groupList.find(g => g.id === group?.id);
		if (updatedGroup) {
			// Preserve enriched device data
			const enrichedDevices = group.devices;
			group = { ...group, ...updatedGroup };
			// Re-enrich with device data
			group.devices = group.devices.map(gDev => {
				const fullDevice = allDevices.find(d => (d.id || d.deviceId) === (gDev.id || gDev.deviceId));
				return fullDevice ? { ...gDev, ...fullDevice } : gDev;
			});
			updateGroupDisplay();
		}
	};

	ws.onNDISourceUpdate = (sourcesUpdate) => {
		if (JSON.stringify(sources) !== JSON.stringify(sourcesUpdate)) {
			sources = sourcesUpdate;
			renderGroup();
		}
	};

	// Handle device updates from WebSocket - update device stats without page reload
	ws.onDevicesUpdate = (devices) => {
		allDevices = devices;
		if (group) {
			// Update group devices with latest data (preserves scroll position)
			group.devices = group.devices.map(gDev => {
				const fullDevice = devices.find(d => (d.id || d.deviceId) === (gDev.id || gDev.deviceId));
				return fullDevice ? { ...gDev, ...fullDevice } : gDev;
			});
			updateDevicesList();
		}
	};
