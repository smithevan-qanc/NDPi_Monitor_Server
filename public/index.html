<script>
	async function setResolution(output, resolution, rate) {
		let body = {};
		if (output) body.output = output;
		if (resolution) body.resolution = resolution;
		if (rate) body.rate = rate;
		try {
			if (!body) throw new Error('Resolution Not Provided');
			const res = await fetch('/api/resolution', { 
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify(body),
			});
			
			if (!res.ok) {
				const err = await res.json();
				throw new Error(err.message);		
			} else {
				const resData = await res.json();
				toast.success(resData.message);
			}
		} catch (err) {
			toast.error(`${err}`)
		}
	}
</script>

	// Fetch Devices (saved devices only)
	async function fetchDevices() {
		try {
			const res = await fetch('/api/devices');
			const data = await res.json();
			devices = data.devices || [];
			renderDevices();
		} catch (e) {
			console.error('Error fetching devices:', e);
			devices = [];
			renderDevices();
		}
	}

	// Render Devices
	function renderDevices() {
		const list = document.getElementById('devicesList');
		if (!list) {
			console.error('devicesList element not found!');
			return;
		}
		list.innerHTML = '';
		
		if (devices.length === 0) {
			list.innerHTML = '<p style="color: #888; padding: 20px;">No devices added yet...</p>';
			return;
		}
		
		devices.forEach(dev => {
			const tile = document.createElement('div');
			tile.className = 'device-tile' + (dev.status === 'online' ? ' active' : '');
			
			// Build system stats display
			let statsHtml = '';
			if (dev.systemStats && dev.status === 'online') {
				const cpuColor = dev.systemStats.cpu > 80 ? '#f87171' : dev.systemStats.cpu > 50 ? '#fbbf24' : '#4ade80';
				const memColor = dev.systemStats.memory.percent > 80 ? '#f87171' : dev.systemStats.memory.percent > 50 ? '#fbbf24' : '#4ade80';
				const tempColor = dev.systemStats.temperature > 78 ? '#f87171' : dev.systemStats.temperature > 65 ? '#fbbf24' : '#4ade80';
				const tempF = ((dev.systemStats.temperature * 9/5) + 32).toFixed(0);
				statsHtml = `<div class="device-stats">
					<span style="color:${cpuColor};">CPU ${dev.systemStats.cpu}%</span>
					<span style="color:${tempColor};">TEMP ${tempF}°F</span>
					<span style="color:${memColor};">MEM ${dev.systemStats.memory.percent}%</span>
				</div>`;
			}
			
			tile.innerHTML = `
				<div class="device-tile-main">
					<strong style="font-size:15px;">${dev.name}</strong>
					<span class='mono' style="font-size:12px;">${dev.id}</span>
				</div>
				<div class="device-tile-info mono">
					<span>Group: ${dev.group}</span>
					<span>IP: ${dev.ip}</span>
					<span>Source: ${dev.currentSource || 'None'}</span>
					<span style='color:${dev.status==='online'?'rgb(129, 193, 39)':'#888'};'>${dev.status}</span>
				</div>
				${statsHtml}
			`;
			tile.onclick = () => window.location.href = `/device.html?id=${encodeURIComponent(dev.id)}`;
			list.appendChild(tile);
		});
	}

	function addTouchScrollEventListener() {
		const list = document.getElementById('main-div');
		if (!list) return;
		
		let isTouching = false;
		let startY = 0;
		let scrollTop = 0;

		list.addEventListener('touchstart', (e) => {
			isTouching = true;
			startY = e.touches[0].clientY;
			scrollTop = list.scrollTop;
		}, { passive: true });

		list.addEventListener('touchmove', (e) => {
			if (!isTouching) return;
			const currentY = e.touches[0].clientY;
			const deltaY = startY - currentY;
			list.scrollTop = scrollTop + deltaY;
		}, { passive: true });

		list.addEventListener('touchend', () => {
			isTouching = false;
		});
	}

		cpuTempBar.style.background = tempColor;

		if (initLoadMsg) {
